<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global VC Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">
    <div class="max-w-6xl mx-auto px-6 py-12">
        <header class="mb-16 border-b border-slate-200 pb-10">
            <h1 class="text-5xl font-black text-slate-900 tracking-tight italic">VC Radar</h1>
            <p id="globalStatus" class="text-slate-400 mt-4 font-bold uppercase tracking-widest text-xs font-medium">Initializing intelligence network...</p>
        </header>

        <div id="tiersContainer" class="space-y-24"></div>

        <footer class="mt-32 pt-10 border-t border-slate-200 text-center text-slate-300 text-[10px] font-black uppercase tracking-[0.4em]">
            Automated Historical Tracking • Powered by Gemini 2.5 Flash
        </footer>
    </div>

    <script>
        const createCard = (deal) => `
            <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-xl transition-all duration-300 group">
                <div class="flex justify-between items-start mb-4">
                    <h4 class="font-black text-slate-800 leading-tight group-hover:text-indigo-600 transition-colors truncate pr-2" title="${deal.Startup_Name}">${deal.Startup_Name}</h4>
                    <span class="bg-indigo-50 text-indigo-700 text-[9px] font-black px-2 py-1 rounded-full uppercase whitespace-nowrap">${deal.Round || 'N/A'}</span>
                </div>
                <p class="text-slate-500 text-xs leading-relaxed mb-6 line-clamp-3 h-12">${deal.Description || 'No description provided.'}</p>
                <div class="flex justify-between items-center pt-4 border-t border-slate-50">
                    <span class="text-indigo-600 font-black text-sm">${deal.Amount || 'Undisclosed'}</span>
                    <a href="${deal.Careers_Link || '#'}" target="_blank" class="text-[10px] font-bold text-slate-900 underline decoration-indigo-200 underline-offset-4 hover:decoration-indigo-600 transition-all">Careers →</a>
                </div>
            </div>
        `;

        async function safeFetchJson(path) {
            try {
                const response = await fetch(`./${path}`);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (error) {
                console.warn(`Could not load ${path}`);
                return null;
            }
        }

        async function init() {
            const statusEl = document.getElementById('globalStatus');
            const container = document.getElementById('tiersContainer');

            try {
                const config = await safeFetchJson('nation_config.json');
                if (!config) {
                    statusEl.innerText = "Config Missing: nation_config.json not found.";
                    return;
                }

                container.innerHTML = '';
                for (const [tier, nations] of Object.entries(config)) {
                    if (!Array.isArray(nations) || nations.length === 0) continue;

                    const tierHeader = document.createElement('div');
                    tierHeader.innerHTML = `
                        <div class="flex items-center gap-4 mb-10">
                            <h2 class="text-xs font-black uppercase tracking-widest text-indigo-600 bg-indigo-50 px-4 py-2 rounded-full">${tier} Markets</h2>
                            <div class="flex-grow h-px bg-slate-200"></div>
                        </div>
                        <div id="tier-grid-${tier.replace(/\s+/g, '-')}" class="space-y-16 mb-20"></div>
                    `;
                    container.appendChild(tierHeader);
                    const tierGrid = document.getElementById(`tier-grid-${tier.replace(/\s+/g, '-')}`);

                    for (const nation of nations) {
                        const nationBlock = document.createElement('div');
                        nationBlock.innerHTML = `
                            <div class="flex items-center gap-3 mb-6">
                                <span class="text-2xl">${nation.flag || '🌐'}</span>
                                <h3 class="text-xl font-bold text-slate-800 tracking-tight">${nation.label}</h3>
                            </div>
                            <div id="grid-${nation.id}" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                                <p class="text-slate-300 italic text-sm py-8 col-span-full">Synchronizing history...</p>
                            </div>
                        `;
                        tierGrid.appendChild(nationBlock);

                        safeFetchJson(`data/${nation.id}.json`).then(data => {
                            const grid = document.getElementById(`grid-${nation.id}`);
                            if (!grid) return;
                            grid.innerHTML = '';
                            if (!data || !data.deals || data.deals.length === 0) {
                                grid.innerHTML = '<p class="text-slate-300 text-xs italic py-4 col-span-full">No historical records found yet.</p>';
                            } else {
                                [...data.deals].reverse().slice(0, 9).forEach(deal => {
                                    grid.innerHTML += createCard(deal);
                                });
                            }
                        });
                    }
                }
                statusEl.innerText = "Intelligence Grid Active";
                statusEl.classList.replace('text-slate-400', 'text-green-600');
            } catch (e) {
                statusEl.innerText = "Sync Failed.";
            }
        }
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
