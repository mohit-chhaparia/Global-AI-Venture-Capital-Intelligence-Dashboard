<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Startup Funding Radar Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 AI Startup Funding Radar</h1>
            <p id="last-updated">Loading data...</p>
        </header>
        
        <div class="controls">
            <div class="filters">
                <select id="nation-filter">
                    <option value="">All Nations</option>
                </select>
                <input type="text" id="search" placeholder="Search startups, descriptions, investors...">
            </div>
        </div>
        
        <div id="dashboard-content">
            <div id="stats-cards"></div>
            <div id="deals-container">
                <h2>Recent Funding Deals</h2>
                <div id="deals-table"></div>
            </div>
        </div>
        
        <footer>
            <p>Data synced daily at 7:00 AM CT | Last sync: <span id="sync-time"></span></p>
        </footer>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
